<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4aeacc;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#3bc8b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8e0c8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="85"/>
    </clipPath>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#bgGrad)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Glass circle background -->
  <circle cx="100" cy="100" r="85" fill="url(#bgGrad)" opacity="0.15"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#bgGrad)" stroke-width="2" opacity="0.7"/>

  <!-- Water waves inside circle -->
  <g clip-path="url(#circleClip)" filter="url(#glow)">
    <!-- Main wave 1 -->
    <path d="M15,95 Q40,75 65,95 Q90,115 115,95 Q140,75 165,95 Q180,105 185,95"
      fill="none" stroke="url(#bgGrad)" stroke-width="3.5" stroke-linecap="round" opacity="1"/>
    <!-- Wave 2 -->  
    <path d="M15,112 Q45,94 70,112 Q95,130 120,112 Q145,94 170,112 Q180,118 185,112"
      fill="none" stroke="url(#bgGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Wave 3 -->
    <path d="M15,128 Q50,113 75,128 Q100,143 125,128 Q150,113 175,128 Q180,131 185,128"
      fill="none" stroke="url(#bgGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Water drop / flow symbol top -->
    <path d="M100,38 C100,38 80,60 80,73 C80,84.6 89.1,94 100,94 C110.9,94 120,84.6 120,73 C120,60 100,38 100,38 Z"
      fill="url(#bgGrad)" opacity="0.35"/>
    <path d="M100,44 C100,44 85,63 85,73 C85,81.3 91.7,88 100,88 C108.3,88 115,81.3 115,73 C115,63 100,44 100,44 Z"
      fill="none" stroke="white" stroke-width="2" opacity="0.85"/>
    
    <!-- Highlight on droplet -->
    <ellipse cx="93" cy="63" rx="3.5" ry="6" fill="white" opacity="0.5" transform="rotate(-15,93,63)"/>
  </g>

  <!-- Shimmer top-left -->
  <circle cx="55" cy="50" r="8" fill="white" opacity="0.06"/>
</svg>
